---
- name: Prepare intended state and read-only runtime hosts
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Retrieve and validate the current NetBox intent
      ansible.builtin.include_tasks: ../tasks/load_intent.yml

    - name: Retrieve runtime settings and credentials from Vault
      ansible.builtin.include_tasks: ../tasks/load_runtime.yml
      vars:
        require_change_approval: false

    - name: Create the temporary test host
      ansible.builtin.add_host:
        name: iosxe_test
        groups: test_cli
        ansible_host: "{{ iosxe_host }}"
        ansible_port: "{{ iosxe_ssh_port }}"
        ansible_user: "{{ iosxe_secret.username }}"
        ansible_password: "{{ iosxe_secret.password }}"
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        managed_loopbacks: "{{ managed_loopbacks }}"
      no_log: true

- name: Test interfaces and OSPF against NetBox intent
  hosts: test_cli
  gather_facts: false
  tasks:
    - name: Retrieve interface and OSPF state
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
          - show running-config | section router ospf
      register: observed_state

    - name: Test every intended interface and IPv4 address
      ansible.builtin.assert:
        that:
          - item.name in observed_state.stdout[0]
          - item.ipv4 in observed_state.stdout[0]
        fail_msg: "Interface test failed for {{ item.name }} with address {{ item.ipv4 }}."
        success_msg: "Interface test passed for {{ item.name }}."
      loop: "{{ managed_loopbacks }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Test every intended OSPF network statement
      ansible.builtin.assert:
        that:
          - item.ipv4 in observed_state.stdout[1]
        fail_msg: "OSPF test failed for {{ item.ipv4 }} in area 0."
        success_msg: "OSPF test passed for {{ item.ipv4 }}."
      loop: "{{ managed_loopbacks }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Summarize the test result
      ansible.builtin.debug:
        msg: "All tests passed for {{ managed_loopbacks | length }} NetBox-managed loopback(s)."
